  notes: 'Test embedding dim=16 — larger than current dim=8 default. Guo & Berkhahn
    (2016) rule of thumb: min(n_states/2, 50) = 13 for 26 states. 16 is close to that
    theoretical optimum. Previous experiments showed dim=4 < dim=8 < dim=8_geoinit
    in most regions, so going to 16 tests whether more capacity helps despite sparsity.
    Shared head input grows from 72 to 80 (64 hidden + 16 emb). Target: beat regional
    ensemble WIS=1505.9. INVALIDATED: state_sigma_scale + state_weights interaction
    caused catastrophic split 3 explosion (WIS ~7231) across all runs. Bug partially
