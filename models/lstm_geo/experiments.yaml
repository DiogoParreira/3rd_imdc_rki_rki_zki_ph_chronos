  lag_weeks: []
  use_incidence: false
  force_rerun: false
  leakage_fix: true
  notes: 'Isolate inverse-volume loss weighting from incidence experiment. Keeps raw
    cases target and equal sigma scaling. state_weights = 1/mean_cases_per_state,
    normalised to mean=1. Hypothesis: small states (AL, CE, MA) get higher gradient
    weight, reducing Northeast overestimation without breaking scale calibration.
    Target: beat regional ensemble WIS=1505.9. INVALIDATED: state_sigma_scale + state_weights
    interaction caused catastrophic split 3 explosion (WIS ~7231) across all runs.
    Bug partially fixed (weight clipping, sigma clamping) but results still unreliable.
    Abandoned in favour of ensemble approach.'
  status: done
