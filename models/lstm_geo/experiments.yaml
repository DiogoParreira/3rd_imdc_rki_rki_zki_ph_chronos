  notes: 'Isolate per-state sigma scaling from incidence experiment. Keeps raw cases
    target and equal loss weights. state_sigma_scale: nn.Embedding(n_states, 1) learned
    during training. Final sigma = model_sigma * softplus(state_scale) + 0.5. Hypothesis:
    South states (PR, SC, RS) learn wider intervals naturally, fixing 42-53% coverage
    without global sigma tuning. Target: beat regional ensemble WIS=1505.9. INVALIDATED:
    state_sigma_scale + state_weights interaction caused catastrophic split 3 explosion
